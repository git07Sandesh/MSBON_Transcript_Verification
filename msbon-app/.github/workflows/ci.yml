name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Backend lint (flake8)
        run: |
          pip install flake8
          flake8 backend/app \
            --max-line-length=120 \
            --exclude=backend/migrations

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        run: cd frontend && npm ci --frozen-lockfile

      - name: Frontend lint (ESLint)
        run: cd frontend && npm run lint

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      GEMINI_API_KEY: test-placeholder-key-long-enough
      JWT_SECRET: test-secret-key-32-chars-minimum!!
      ENCRYPTION_KEY: test-encryption-key-32-chars-min!!
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-cov httpx

      - name: Run backend tests
        run: |
          cd backend
          pytest \
            --cov=app \
            --cov-fail-under=80 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --frozen-lockfile

      - name: Run frontend tests with coverage
        run: cd frontend && npx vitest run --coverage

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t msbon-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=http://localhost:8000/api/v1 \
            -t msbon-frontend:ci \
            ./frontend

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Python dependency scan (safety)
        run: |
          pip install safety
          safety check -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        run: cd frontend && npm ci --frozen-lockfile

      - name: npm audit
        run: cd frontend && npm audit --audit-level=high

  migrate:
    name: Migration Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test_migrate.db
      GEMINI_API_KEY: test-placeholder-key-long-enough
      JWT_SECRET: test-secret-key-32-chars-minimum!!
      ENCRYPTION_KEY: test-encryption-key-32-chars-min!!
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations up
        run: cd backend && alembic upgrade head

      - name: Run migrations down
        run: cd backend && alembic downgrade -1

      - name: Run migrations up again (verify round-trip)
        run: cd backend && alembic upgrade head
